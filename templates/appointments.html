{% extends "base.html" %}
{% block content %}
<h2>Appointments</h2>

<table>
    <tr>
        <th>Patient</th>
        <th>Doctor</th>
        <th>Date</th>
        <th>Reason</th>
    </tr>
    {% for a in appointments %}
    <tr>
        <td>{{ a[0] }} {{ a[1] }}</td>
        <td>{{ a[2] }} {{ a[3] }}</td>
        <td>{{ a[4] }}</td>
        <td>{{ a[5] }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
